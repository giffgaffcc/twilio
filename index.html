<script>
let currentPage=1,currentFilter='all',currentSearch='',searchTimer,selectedId=null;

function fetchMessages(page=1){
  currentPage=page;
  fetch(`messages.php?page=${page}&filter=${currentFilter}&search=${encodeURIComponent(currentSearch)}`)
    .then(r=>r.json()).then(d=>{
      if(!d.ok)return;
      document.getElementById('total-count').textContent=d.total+' 条';
      renderList(d.rows);
      renderPagination(d.total,page);
    });
}

function renderList(rows){
  const el=document.getElementById('msg-list');
  if(!rows.length){el.innerHTML='<div class="empty-list">暂无消息</div>';return;}
  el.innerHTML=rows.map(r=>{
    const num=r.direction==='inbound'?r.from_number:r.to_number;
    const badge=r.direction==='inbound'?'<span class="badge badge-in">收</span>':'<span class="badge badge-out">发</span>';
    const time=(r.created_at||'').slice(5,16);
    const sel=r.id==selectedId?'selected':'';
    const body=r.body.replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<div class="msg-item ${sel}" onclick="showDetail(${r.id},this,'${r.direction}','${r.from_number}','${r.to_number}',${JSON.stringify(r.body).replace(/'/g,"\\'")},'${r.status||''}','${r.sid||''}','${r.created_at||''}')">
      <span class="msg-item-number">${badge} ${num}</span><span class="msg-item-time">${time}</span>
      <span class="msg-item-preview">${body}</span></div>`;
  }).join('');
}

function showDetail(id,el,dir,from,to,body,status,sid,created_at){
  selectedId=id;
  document.querySelectorAll('.msg-item').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
  const badge=dir==='inbound'?'<span class="badge badge-in" style="font-size:12px;padding:.2rem .6rem">收到</span>':'<span class="badge badge-out" style="font-size:12px;padding:.2rem .6rem">发出</span>';
  const safeBody=body.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  document.getElementById('detail-panel').innerHTML=`
    <div class="detail-card">
      <div class="detail-header">${badge}<span style="font-size:var(--text-xs);color:var(--text-faint)">${created_at}</span></div>
      <div class="detail-meta">
        <div class="meta-row"><span class="meta-label">发件方</span><span class="meta-value">${from}</span></div>
        <div class="meta-row"><span class="meta-label">收件方</span><span class="meta-value">${to}</span></div>
        <div class="meta-row"><span class="meta-label">状态</span><span class="meta-value">${status}</span></div>
        <div class="meta-row"><span class="meta-label">SID</span><span class="meta-value" style="font-size:10px;word-break:break-all">${sid||'-'}</span></div>
      </div>
      <div class="msg-body">${safeBody}</div>
      ${dir==='inbound'?`<button class="btn btn-ghost btn-sm" style="margin-top:.75rem" onclick="document.getElementById('send-to').value='${from}';document.getElementById('send-body').focus()">↩ 回复此号码</button>`:''}
    </div>`;
}

function renderPagination(total,page){
  const pages=Math.ceil(total/30);
  if(pages<=1){document.getElementById('pagination').innerHTML='';return;}
  let html='';
  if(page>1)html+=`<button class="page-btn" onclick="fetchMessages(${page-1})">‹</button>`;
  for(let i=Math.max(1,page-2);i<=Math.min(pages,page+2);i++)
    html+=`<button class="page-btn ${i===page?'active':''}" onclick="fetchMessages(${i})">${i}</button>`;
  if(page<pages)html+=`<button class="page-btn" onclick="fetchMessages(${page+1})">›</button>`;
  document.getElementById('pagination').innerHTML=html;
}

function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');fetchMessages(1);
}
function debounceSearch(){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{currentSearch=document.getElementById('search-input').value;fetchMessages(1);},400);
}
function sendSMS(){
  const to=document.getElementById('send-to').value.trim();
  const body=document.getElementById('send-body').value.trim();
  if(!to||!body){showToast('请填写收件号码和内容','err');return;}
  const btn=document.getElementById('send-btn');
  btn.innerHTML='<span class="spinner"></span> 发送中';btn.disabled=true;
  const fd=new FormData();fd.append('to',to);fd.append('body',body);
  fetch('send.php',{method:'POST',body:fd}).then(r=>r.json()).then(d=>{
    btn.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> 发送';
    btn.disabled=false;
    if(d.ok){showToast('发送成功 ✓','ok');document.getElementById('send-body').value='';setTimeout(()=>fetchMessages(currentPage),1000);}
    else showToast('发送失败：'+d.msg,'err');
  });
}
function showToast(msg,type='ok'){
  const wrap=document.getElementById('toast-wrap');
  const el=document.createElement('div');el.className='toast toast-'+type;el.textContent=msg;
  wrap.appendChild(el);setTimeout(()=>el.remove(),3500);
}
function toggleTheme(){
  const html=document.documentElement,cur=html.getAttribute('data-theme');
  html.setAttribute('data-theme',cur==='dark'?'light':'dark');
}
setInterval(()=>fetchMessages(currentPage),30000);
fetchMessages(1);
</script>
